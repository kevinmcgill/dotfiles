# Light theme: Rose Pine Dawn
# Sourced by dark-notify when macOS switches to light mode.
# Hardcodes Rose Pine Dawn colors directly (no plugin needed — rose-pine/tmux
# conflicts with catppuccin/tmux under TPM as both install to the same directory).
#
# Color mapping from Rose Pine Dawn palette:
#   bg          #faf4ed   base
#   overlay     #9893a5   muted
#   surface     #f2e9e1   surface
#   text        #575279   text
#   love        #b4637a   red tones
#   foam        #56949f   green/teal tones
#   rose        #d7827e   current window highlight
#   pine        #286983   blue tones

set -g status-position top
set -g status-style "bg=#faf4ed"

# pane border look and feel
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-indicators arrows
setw -g pane-active-border-style "bg=#faf4ed,fg=#9893a5"
setw -g pane-border-style "bg=#faf4ed,fg=#f2e9e1"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#faf4ed,fg=#575279"
set -g window-status-activity-style "bg=#b4637a,fg=#faf4ed"
set -g window-status-bell-style "bg=#b4637a,fg=#faf4ed,bold"
set -gF window-status-separator " "

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#286983,fg=#faf4ed,bold"

# set status line contents
set -g status-left ""
set -g status-right ""
set -g status-right-length 100
set -ga status-right "#{?client_prefix,#{#[bg=#faf4ed,fg=#b4637a,bold]  #S },#{#[bg=#faf4ed,fg=#56949f]  #S }}"
set -ga status-right "#[bg=#deeaed,fg=#575279] 󰭦 %a %-d %b 󰅐 %H:%M %Z"
