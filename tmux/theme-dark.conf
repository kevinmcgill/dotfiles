# Dark theme: Catppuccin Macchiato
# Sourced by dark-notify when macOS switches to dark mode.
# Hardcodes Catppuccin Macchiato colors directly so this file is self-contained
# and does not depend on the catppuccin plugin running asynchronously.
#
# Color mapping from Catppuccin Macchiato palette:
#   bg          #24273a   base
#   overlay_0   #6e738d   overlay 0
#   surface_0   #363a4f   surface 0
#   rosewater   #f4dbd6   rosewater
#   red         #ed8796   red
#   green       #a6da95   green
#   peach       #f5a97f   peach
#   blue        #8aadf4   blue

set -g status-position top
set -g status-style "bg=#24273a"

# pane border look and feel
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-indicators arrows
setw -g pane-active-border-style "bg=#24273a,fg=#6e738d"
setw -g pane-border-style "bg=#24273a,fg=#363a4f"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#24273a,fg=#f4dbd6"
set -g window-status-activity-style "bg=#ed8796,fg=#24273a"
set -g window-status-bell-style "bg=#ed8796,fg=#24273a,bold"
set -gF window-status-separator " "

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#f5a97f,fg=#24273a,bold"

# set status line contents
set -g status-left ""
set -g status-right ""
set -g status-right-length 100
set -ga status-right "#{?client_prefix,#{#[bg=#24273a,fg=#ed8796,bold]  #S },#{#[bg=#24273a,fg=#a6da95]  #S }}"
set -ga status-right "#[bg=#24273a,fg=#8aadf4] 󰭦 %a %-d %b 󰅐 %H:%M %Z"
