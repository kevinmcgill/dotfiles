# List of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "catppuccin/tmux#v2.1.3" # pin to v2.x to get @thm_* variables

# Fix colors and italic fonts
set -g default-terminal "tmux-256color" # advertise tmux's preferred terminfo
set -ga terminal-overrides ',xterm-256color:Tc' # keep truecolor for xterm-256color
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q' # allow cursor shape escape sequences
set-environment -g COLORTERM "truecolor" # hint truecolor for apps inside tmux

set -g mouse on

# easily edit and reload tmux config file
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
bind-key M split-window -h "nvim ~/.tmux.conf"

# Use C-<Space> (control and space key at the same time) as the prefix key
unbind C-b
set -g prefix C-Space

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# previous / next window navigation
# allows you to hold Ctrl and repeat <space> + h + l
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
unbind p
unbind n

# last window navigation
# Ctrl + Space and then Space
bind C-Space send-prefix
bind Space last-window

# ESC in tmux is delayed, reduce timeout from 500ms
set -sg escape-time 10

# See https://github.com/tmux-plugins/tmux-sensible
# Increase scrollback buffer size from 2000
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# v in copy mode starts making selection, y yanks selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection

# Make Prefix p paste the buffer.
bind p paste-buffer

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Load dark theme by default (dark-notify will override at runtime)
source-file ~/.config/tmux/theme-dark.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.tmux/plugins/tpm/tpm"
