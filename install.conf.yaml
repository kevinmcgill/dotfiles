- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.asdfrc: asdf/asdfrc
    ~/.Brewfile: homebrew/Brewfile
    ~/.Brewfile.lock.json: homebrew/Brewfile.lock.json
    ~/.gitconfig: gitconfig
    ~/.gitignore: gitignore
    ~/.irbrc: irbrc
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.config/atuin:
        path: atuin
        create: true
    ~/.config/bat:
        path: bat
        create: true
    ~/.config/dark-notify:
        path: dark-notify
        create: true
    ~/.config/ghostty:
        path: ghostty
        create: true
    ~/.config/lazygit:
        path: lazygit
        create: true
    ~/.config/nvim:
        path: nvim
        create: true
    ~/.config/opencode:
        path: opencode
        create: true
    ~/.config/rubocop:
        path: rubocop
        create: true
    ~/.config/tmux:
        path: tmux
        create: true
    ~/.config/tmuxinator:
        path: tmuxinator
        create: true
    ~/.config/wezterm:
        path: wezterm
        create: true
    ~/Library/LaunchAgents/homebrew.mxcl.dark-notify.plist: dark-notify/homebrew.mxcl.dark-notify.plist

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [
      ./dark-notify/theme-switch.sh dark,
      Bootstrapping lazygit theme symlink (dark-notify overrides at runtime),
    ]
